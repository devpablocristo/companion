name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: companion go
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: check migration versions
        run: bash scripts/quality/check-migrations.sh

  console:
    name: console
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install deps
        working-directory: console
        run: npm ci

      - name: Typecheck
        working-directory: console
        run: npm run typecheck

      - name: Build
        working-directory: console
        run: npm run build
