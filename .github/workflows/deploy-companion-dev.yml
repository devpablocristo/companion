name: Deploy Companion DEV (Cloud Run)

on:
  push:
    branches: [develop]
    paths:
      - "cmd/**"
      - "internal/**"
      - "wire/**"
      - "migrations/**"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/deploy-companion-dev.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Rama o ref a desplegar (default: develop)"
        required: false
        default: "develop"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-companion-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      IMAGE_NAME: companion
      SERVICE_NAME: companion-dev
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_DEV }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.COMPANION_CLOUD_RUN_SERVICE_ACCOUNT_DEV }}
      GOVERNANCE_BASE_URL: ${{ vars.COMPANION_GOVERNANCE_BASE_URL_DEV }}
      DB_USER: companion_app
      DB_NAME: companion
      SECRET_DB_PASSWORD_NAME: companion-db-password
      SECRET_API_KEYS_NAME: companion-api-keys
      SECRET_GOVERNANCE_API_KEY_NAME: companion-governance-api-key
      SECRET_LLM_API_KEY_NAME: companion-llm-api-key

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Auth GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validate Secret Manager inputs
        run: |
          missing=0
          for secret_name in \
            "$SECRET_DB_PASSWORD_NAME" \
            "$SECRET_API_KEYS_NAME" \
            "$SECRET_GOVERNANCE_API_KEY_NAME" \
            "$SECRET_LLM_API_KEY_NAME"; do
            if ! gcloud secrets versions access latest --project="$GCP_PROJECT_ID" --secret="$secret_name" >/dev/null 2>&1; then
              echo "::error::Secret Manager secret '$secret_name' no existe o no tiene versiones en project '$GCP_PROJECT_ID'"
              missing=1
            fi
          done
          exit "$missing"

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build y push imagen
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker build -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Resolve DB password for DATABASE_URL
        run: |
          db_password="$(gcloud secrets versions access latest --project="$GCP_PROJECT_ID" --secret="$SECRET_DB_PASSWORD_NAME")"
          if [[ -z "$db_password" ]]; then
            echo "::error::No se pudo resolver $SECRET_DB_PASSWORD_NAME"
            exit 1
          fi
          echo "::add-mask::$db_password"
          export DB_PASSWORD="$db_password"
          db_password_enc="$(python3 -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['DB_PASSWORD'], safe=''))")"
          # Cloud Run conecta a Cloud SQL vía unix socket: /cloudsql/<instance-connection>
          database_url="postgres://${DB_USER}:${db_password_enc}@/${DB_NAME}?host=/cloudsql/${CLOUDSQL_INSTANCE}"
          echo "::add-mask::$database_url"
          echo "DATABASE_URL=$database_url" >> "$GITHUB_ENV"

      - name: Deploy a Cloud Run
        env:
          LLM_PROVIDER: ${{ vars.COMPANION_LLM_PROVIDER_DEV }}
          LLM_MODEL: ${{ vars.COMPANION_LLM_MODEL_DEV }}
        run: |
          # DEV: ingress=all + allow-unauthenticated. La auth real la dan
          # COMPANION_API_KEYS (header HTTP). Esto permite browser/curl directos
          # contra companion-dev sin VPC connector ni cliente OIDC.
          # Para prod: cerrar con --no-allow-unauthenticated + ingress interno + IAP/LB.
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="DATABASE_URL=${DATABASE_URL},GOVERNANCE_BASE_URL=${GOVERNANCE_BASE_URL},COMPANION_LLM_PROVIDER=${LLM_PROVIDER},COMPANION_LLM_MODEL=${LLM_MODEL},COMPANION_GOVERNANCE_SYNC_INTERVAL_SEC=30,COMPANION_STRICT_GOVERNANCE=true" \
            --set-secrets="COMPANION_API_KEYS=${SECRET_API_KEYS_NAME}:latest,GOVERNANCE_API_KEY=${SECRET_GOVERNANCE_API_KEY_NAME}:latest,COMPANION_LLM_API_KEY=${SECRET_LLM_API_KEY_NAME}:latest" \
            --allow-unauthenticated \
            --ingress=all \
            --port=8080 \
            --min-instances=0 \
            --max-instances=3

      - name: Resolve service URL
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "::error::no se pudo resolver service URL"
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"
          echo "Service URL: $service_url"

      - name: Smoke check
        run: |
          for i in {1..20}; do
            read -r latest_ready latest_created < <(gcloud run services describe "$SERVICE_NAME" \
              --project="$GCP_PROJECT_ID" \
              --region="$GCP_REGION" \
              --format='value(status.latestReadyRevisionName,status.latestCreatedRevisionName)')
            if [[ -n "$latest_created" && "$latest_ready" == "$latest_created" ]]; then
              echo "Cloud Run ready: $latest_ready"
              exit 0
            fi
            echo "attempt $i: latestReady=$latest_ready latestCreated=$latest_created, retrying in 3s..."
            sleep 3
          done
          echo "::error::Cloud Run no marcó ready la última revisión tras reintentos"
          exit 1
