services:
  companion-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_companion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${COMPANION_POSTGRES_PORT:-15435}:5432"
    volumes:
      - companion-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_companion"]
      interval: 2s
      timeout: 3s
      retries: 30

  companion:
    build:
      context: .
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@companion-postgres:5432/nexus_companion?sslmode=disable"
      NEXUS_API_KEYS: "admin=${COMPANION_ADMIN_API_KEY:-companion-admin-dev-key}|service_principal=true|scopes=companion:tasks:read+companion:tasks:write+companion:connectors:execute+companion:connectors:admin"
      NEXUS_AUTH_ISSUER_URL: "${NEXUS_AUTH_ISSUER_URL:-}"
      NEXUS_AUTH_AUDIENCE: "${NEXUS_AUTH_AUDIENCE:-}"
      # Apunta al servicio Nexus Governance (proyecto separado).
      # En dev: levantá Nexus aparte y usá su URL/key aquí.
      NEXUS_BASE_URL: "${NEXUS_BASE_URL:-http://host.docker.internal:18084}"
      NEXUS_API_KEY: "${NEXUS_API_KEY:-nexus-admin-dev-key}"
      COMPANION_NEXUS_SYNC_INTERVAL_SEC: "${COMPANION_NEXUS_SYNC_INTERVAL_SEC:-30}"
      PYMES_BASE_URL: "${PYMES_BASE_URL:-}"
      PYMES_API_KEY: "${PYMES_API_KEY:-}"
      COMPANION_WATCHER_INTERVAL_SEC: "${COMPANION_WATCHER_INTERVAL_SEC:-0}"
      NEXUS_LLM_PROVIDER: "${NEXUS_LLM_PROVIDER:-echo}"
      NEXUS_LLM_API_KEY: "${NEXUS_LLM_API_KEY:-}"
      NEXUS_LLM_MODEL: "${NEXUS_LLM_MODEL:-qwen2.5:3b}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${COMPANION_PORT:-18085}:8080"
    depends_on:
      companion-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  console:
    build:
      context: ./console
    restart: unless-stopped
    environment:
      COMPANION_PROXY_API_KEY: "${COMPANION_ADMIN_API_KEY:-companion-admin-dev-key}"
      NEXUS_PROXY_API_KEY: "${NEXUS_API_KEY:-nexus-admin-dev-key}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${COMPANION_CONSOLE_PORT:-13002}:80"
    depends_on:
      companion:
        condition: service_healthy

  ollama:
    image: ollama/ollama:0.5.7
    profiles:
      - ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  companion-postgres-data:
  ollama-data:
